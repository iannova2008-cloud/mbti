<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교생활 MBTI 테스트</title>
    <!-- 귀여운 한글 폰트 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #55a665; /* 파스텔 그린 */
            --primary-light: #eef7f0; /* 부드러운 그린 크림 */
            --primary-dark: #3b7a48; /* 깊은 숲속 그린 */
            --accent-color: #ffd54f; /* 귀여운 파스텔 옐로우 */
            --text-color: #2c3e50; /* 편안한 다크 블루그레이 */
            --bg-color: #f3f9f4; /* 은은한 백그라운드 */
            --card-bg: #ffffff;
            --border-color: #c8e6c9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#d0ebd5 1.5px, transparent 1.5px), radial-gradient(#d0ebd5 1.5px, #f3f9f4 1.5px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Gaegu', 'Nanum Gothic', sans-serif;
            overflow-x: hidden;
        }

        /* 메인 컨테이너 */
        .container {
            background: var(--card-bg);
            max-width: 480px;
            width: 100%;
            border-radius: 30px;
            box-shadow: 0 12px 30px rgba(85, 166, 101, 0.15);
            padding: 35px 25px;
            border: 4px solid var(--primary-color);
            text-align: center;
            position: relative;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        /* 화면 숨김 */
        .hidden {
            display: none !important;
        }

        /* 🏠 상단 홈 버튼 */
        .header-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
            width: 100%;
            min-height: 35px;
        }

        .home-btn {
            background: var(--primary-light);
            border: 2px solid var(--primary-color);
            border-radius: 15px;
            color: var(--primary-dark);
            cursor: pointer;
            padding: 4px 12px;
            font-family: 'Gaegu', sans-serif;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .home-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.05);
        }

        /* 타이틀 & 문구 */
        h1 {
            color: var(--primary-dark);
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 1px 1px 0px #fff;
        }

        .subtitle {
            color: #618c6a;
            font-size: 19px;
            margin-bottom: 25px;
            line-height: 1.3;
        }

        .main-illust {
            font-size: 90px;
            margin: 20px 0;
            animation: bounce 2s infinite alternate;
        }

        /* 버튼류 */
        button.action-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-family: 'Gaegu', sans-serif;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0px var(--primary-dark);
            transition: all 0.1s ease;
            position: relative;
        }

        button.action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px var(--primary-dark);
        }

        /* 스테이지 진행 상황 */
        .stage-tag {
            font-size: 18px;
            color: var(--primary-dark);
            font-weight: bold;
            margin-bottom: 6px;
        }

        .progress-bg {
            width: 100%;
            height: 16px;
            background-color: var(--primary-light);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
            transition: width 0.3s ease;
        }

        /* 질문 박스 */
        .question-box {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 25px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            padding: 15px;
            border-radius: 20px;
            border: 2px dashed var(--primary-color);
        }

        /* 선택지 버튼 */
        .answer-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 3px solid var(--border-color);
            margin-bottom: 15px;
            text-align: left;
            font-weight: bold;
            font-family: 'Gaegu', sans-serif;
            font-size: 19px;
            padding: 16px 20px;
            border-radius: 20px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 0px var(--border-color);
            transition: all 0.15s ease;
            line-height: 1.3;
        }

        .answer-btn:hover {
            background-color: var(--primary-light);
            border-color: var(--primary-color);
            box-shadow: 0 4px 0px var(--primary-color);
            transform: translateY(-2px);
        }

        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px var(--primary-color);
        }

        /* 결과 화면 특화 스타일 */
        .character-card {
            background-color: #fff9e6;
            border: 3px dashed #ffb300;
            border-radius: 25px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
        }

        .disney-char {
            font-size: 28px;
            color: #d32f2f;
            font-weight: bold;
            margin-top: 5px;
            background: white;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 15px;
            border: 2px solid #ffc107;
        }

        .result-desc {
            background-color: var(--primary-light);
            padding: 15px 20px;
            border-radius: 20px;
            border: 2px solid var(--border-color);
            text-align: left;
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 25px;
            color: var(--primary-dark);
        }

        .result-desc ul {
            padding-left: 15px;
            margin-top: 8px;
        }

        .result-desc li {
            margin-bottom: 6px;
            list-style-type: '🌱 ';
        }

        /* 커스텀 경고 모달창 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: white;
            border-radius: 25px;
            border: 4px solid var(--primary-color);
            padding: 25px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-box h3 {
            font-size: 24px;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .modal-box p {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
        }

        .modal-btns button {
            flex: 1;
            padding: 10px;
            font-family: 'Gaegu', sans-serif;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            border: none;
        }

        .btn-confirm {
            background-color: #e57373;
            color: white;
        }

        .btn-cancel {
            background-color: var(--primary-color);
            color: white;
        }

        /* 이모티콘 파티 캔버스 */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* 애니메이션 모음 */
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <!-- 🏠 상단 기능 바 -->
        <div class="header-bar">
            <button id="top-home-btn" class="home-btn hidden" onclick="confirmGoHome()">
                🏠 처음으로
            </button>
        </div>

        <!-- 1. 메인 시작 화면 -->
        <div id="start-screen">
            <div class="main-illust">🏫</div>
            <h1>학교생활 MBTI 테스트</h1>
            <p class="subtitle">나와 어울리는 디즈니 캐릭터 찾기</p>
            <button class="action-btn" onclick="startTest()">테스트 시작하기 🚀</button>
        </div>

        <!-- 2. 테스트 진행 화면 -->
        <div id="test-screen" class="hidden">
            <div id="stage-tag" class="stage-tag">🎒 STAGE 1. 등교길</div>
            <div class="progress-bg">
                <div id="progress" class="progress-fill"></div>
            </div>
            <div id="question" class="question-box">질문지 로딩중... 🔍</div>
            <button class="answer-btn" onclick="selectAnswer(0)">A 타입 선택문구</button>
            <button class="answer-btn" onclick="selectAnswer(1)">B 타입 선택문구</button>
        </div>

        <!-- 3. 결과 화면 -->
        <div id="result-screen" class="hidden">
            <p class="subtitle">🎉 나의 분석 결과 🎉</p>
            <div id="result-type" style="font-size: 38px; font-weight: bold; color: var(--primary-dark);">XXXX</div>
            
            <div class="character-card">
                <div id="result-emoji" style="font-size: 60px; margin-bottom: 5px;">👑</div>
                <div id="result-title" style="font-size: 22px; font-weight: bold; color: #555;">수식어</div>
                <div id="result-disney" class="disney-char">디즈니 매칭 캐릭터</div>
            </div>

            <div class="result-desc">
                <strong>🏫 내 교실 속 모습 분석:</strong>
                <ul id="result-features">
                    <!-- 자바스크립트로 추가 -->
                </ul>
            </div>
            <button class="action-btn" onclick="restartTest()">다시 테스트하기 🔄</button>
        </div>
    </div>

    <!-- 🏠 처음으로 가기 경고 모달창 -->
    <div id="home-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>🏠 정말 홈화면으로 갈래?</h3>
            <p>지금까지 풀었던 테스트 진행 사항이 모두 초기화돼!</p>
            <div class="modal-btns">
                <button class="btn-confirm" onclick="goHome()">응, 갈래!</button>
                <button class="btn-cancel" onclick="closeHomeModal()">아니, 계속 풀래!</button>
            </div>
        </div>
    </div>

    <script>
        // 시나리오 및 매칭 데이터
        const questions = [
            {
                stage: "🎒 STAGE 1. 등교길",
                q: "🎒 교문에 들어서며 멀리서 아는 친구를 발견했을 때 나는?",
                a: [{ text: "🏃‍♂️ 반갑게 소리치거나 마구 달려가서 친근하게 먼저 장난을 건다!", type: "E" },
                    { text: "🤫 친하긴 하지만 조용히 뒤따라 걸어가면서 아주 자연스레 인사한다.", type: "I" }]
            },
            {
                stage: "🎒 STAGE 1. 등교길",
                q: "📏 오늘 교문 복장 단속이 엄청 빡세다! 이때 드는 내 생각은?",
                a: [{ text: "👌 안 걸리게 옷매무새를 가다듬자! 규정에 어긋나지 않게 조심!", type: "S" },
                    { text: "🤔 왜 양말 색깔까지 잡는 걸까? 복장과 성적에 어떤 상관관계가 있지?", type: "N" }]
            },
            {
                stage: "📝 STAGE 2. 1교시 수업",
                q: "🤝 첫 수업 시간, 선생님께서 조별 과제팀을 정해주셨다!",
                a: [{ text: "🤩 와! 새로운 친구들이랑 팀플레이할 생각에 벌써 가슴이 두근거린다!", type: "E" },
                    { text: "😰 하... 누구랑 조가 될까? 대화는 또 내가 먼저 시작해야 되나?", type: "I" }]
            },
            {
                stage: "📝 STAGE 2. 1교시 수업",
                q: "✍️ 열심히 수업 필기를 하고 있는 나! 어떤 방식으로 적을까?",
                a: [{ text: "📋 칠판에 적힌 필기 문장과 책 내용을 토씨 하나 틀리지 않고 꼼꼼히 적는다.", type: "S" },
                    { text: "🎨 핵심 아이디어나 전체 흐름을 나만의 독창적인 마인드맵 형태로 적는다.", type: "N" }]
            },
            {
                stage: "☕ STAGE 3. 쉬는 시간",
                q: "😭 친한 친구가 시험 문제를 밀려 써서 속상하다고 울고 있을 때?",
                a: [{ text: "🥺 헉... 속상하겠다며 같이 눈물을 글썽이며 꼭 안아주고 위로해 준다.", type: "F" },
                    { text: "🧐 몇 번부터 밀려 썼는데? 마킹 실수 점수를 같이 계산해서 다음 대안을 세운다.", type: "T" }]
            },
            {
                stage: "☕ STAGE 3. 쉬는 시간",
                q: "👟 다음 시간인 체육 수업을 준비해야 할 때 내 행동은?",
                a: [{ text: "⚡ 쉬는 시간 종이 치자마자 체육실로 미리 가서 여유롭게 갈아입고 대기한다.", type: "J" },
                    { text: "⏰ 종이 울린 후, 혹은 예비종이 들릴 때 부랴부랴 가방에서 꺼내 급하게 갈아입는다.", type: "P" }]
            },
            {
                stage: "🍱 STAGE 4. 점심 시간",
                q: "🌳 밥을 배불리 먹고 교정을 기분 좋게 산책할 때 내 머릿속은?",
                a: [{ text: "🍱 방금 먹은 급식 반찬 이야기, 오늘 날씨, 다음 교시 숙제 등 현실 얘기를 한다.", type: "S" },
                    { text: "🧟 만약 학교에 갑자기 좀비가 나타나면? 창가 커튼을 찢어 탈출해야지! 상상에 빠진다.", type: "N" }]
            },
            {
                stage: "🍱 STAGE 4. 점심 시간",
                q: "💬 다른 반 친구가 자판기 앞에서 한숨을 쉬며 깊은 고민을 털어놓는다.",
                a: [{ text: "😭 '진짜 힘들었겠다...' 친구의 지친 마음에 100% 이입해서 같이 슬퍼해 준다.", type: "F" },
                    { text: "💡 '그럼 이렇게 해보는 건 어때?' 현실적인 원인을 짚어보고 피드백을 제안한다.", type: "T" }]
            },
            {
                stage: "🎸 STAGE 5. 방과 후 동아리",
                q: "🎪 다가오는 학교 축제에서 동아리 부스를 기획할 때 내 스타일은?",
                a: [{ text: "🗓️ 일자별 예산, 담당 부원 역할 분담, 준비물 리스트를 칼같이 정리해 둔다.", type: "J" },
                    { text: "🌈 큰 가이드라인만 짜두고 세세한 운영은 그날 축제 분위기에 맞게 유동적으로 한다.", type: "P" }]
            },
            {
                stage: "🎸 STAGE 5. 방과 후 동아리",
                q: "👋 우리 동아리에 낯선 타학교 신입 부원들이 들어왔을 때 나는?",
                a: [{ text: "🥳 '안녕! 어디서 왔어?' 폭풍 친화력을 뽐내며 분위기를 띄운다.", type: "E" },
                    { text: "👀 구석 자리에서 묵묵히 지켜보며 상대가 말을 걸어올 때까지 기다린다.", type: "I" }]
            },
            {
                stage: "✍️ STAGE 6. 시험 기간",
                q: "📅 시험을 정확히 2주일 앞두고 계획을 짜는 내 모습은?",
                a: [{ text: "✏️ 1일 차 수학 2단원 완료, 2일 차 영어 단어 암기 등 디테일하고 깔끔한 계획표를 소지한다.", type: "J" },
                    { text: "📚 계획은 머릿속에만 가볍게! 그날그날 공부가 가장 잘되는 과목 위주로 몰아서 달린다.", type: "P" }]
            },
            {
                stage: "✍️ STAGE 6. 시험 기간",
                q: "🤯 너무 난해하고 복잡한 수학 공식이 시험 범위에 추가되었을 때?",
                a: [{ text: "🔍 이 공식이 어째서 이렇게 증명되었는지 깊은 학술적 원리와 개념부터 파헤친다.", type: "N" },
                    { text: "💾 이해하기 어려우면 일단 외우고 본다! 시험 문제 유형과 대입법만 달달 암기한다.", type: "S" }]
            },
            {
                stage: "📜 STAGE 7. 성적표 수령",
                q: "😢 열심히 했는데 결과가 아쉽게 나왔다. 이때 선생님의 피드백 중 나를 울컥하게 하는 것은?",
                a: [{ text: "💌 '결과는 아쉽지만 너 매일 밤샘 자습하면서 성실히 해온 거 다 알아. 넌 멋져!'", type: "F" },
                    { text: "📊 '이번에 주관식 감점이 크네. 오답 노트를 기반으로 다음 기말에 보완하면 문제없어.'", type: "T" }]
            },
            {
                stage: "📜 STAGE 7. 성적표 수령",
                q: "🏖️ 시험이 끝나고 마침내 찾아온 기분 좋은 겨울방학 계획표는?",

        function showQuestion() {
            if (currentIdx >= questions.length) {
                showResult();
                return;
            }

            const currentQ = questions[currentIdx];
            document.getElementById('stage-tag').innerText = currentQ.stage;
            document.getElementById('question').innerText = currentQ.q;
            
            const buttons = document.querySelectorAll('.answer-btn');
            buttons[0].innerText = currentQ.a[0].text;
            buttons[1].innerText = currentQ.a[1].text;

            const percent = (currentIdx / questions.length) * 100;
            document.getElementById('progress').style.width = percent + '%';
        }

        function selectAnswer(btnIdx) {
            const currentQ = questions[currentIdx];
            const selectedType = currentQ.a[btnIdx].type;
            
            scores[selectedType]++;
            currentIdx++;
            showQuestion();
        }

        function showResult() {
            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('top-home-btn').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let mbti = "";
            mbti += (scores.E >= scores.I) ? "E" : "I";
            mbti += (scores.S >= scores.N) ? "S" : "N";
            mbti += (scores.T >= scores.F) ? "T" : "F";
            mbti += (scores.J >= scores.P) ? "J" : "P";

            const resultData = results[mbti];

            document.getElementById('result-type').innerText = mbti;
            document.getElementById('result-emoji').innerText = resultData.emoji;
            document.getElementById('result-title').innerText = resultData.title;
            document.getElementById('result-disney').innerText = "🏰 " + resultData.disney;

            const featuresUl = document.getElementById('result-features');
            featuresUl.innerHTML = "";
            
            resultData.features.forEach(feature => {
                const li = document.createElement('li');
                li.innerText = feature;
                featuresUl.appendChild(li);
            });

            startConfettiParty();
        }

            document.getElementById('result-screen').classList.add('hidden');

        // 캔버스 이모티콘 파티
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let emojis = ["🎒", "📚", "🎨", "🐸", "✨", "👑", "🏫", "🌟", "🦁", "🧜‍♀️", "🤠", "🐰", "🍳"];
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        class ConfettiParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50 - (Math.random() * canvas.height);
                this.size = 20 + Math.random() * 20;
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                this.speedX = -2 + Math.random() * 4;
                this.speedY = 2 + Math.random() * 4;
                this.rotation = Math.random() * 360;
                this.rotSpeed = -1 + Math.random() * 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotSpeed;
                if (this.y > canvas.height + 50) {
                    this.y = -50;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        function startConfettiParty() {
            resizeCanvas();
            particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push(new ConfettiParticle());
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                confettiInterval = requestAnimationFrame(animate);
            }
            animate();
        }

        function stopConfettiParty() {
            cancelAnimationFrame(confettiInterval);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
